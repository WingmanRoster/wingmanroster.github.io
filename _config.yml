# Feature List                            Edit, add or remove features to be presented.
features                                  :

  - title                                 : Instantly Load Your Roster
    description                           : View your schedule in the way that suits you best—choose between an intuitive overview or the classic horizontal format.
    fontawesome_icon_name                 : calendar
    
  - title                                 : Export to Calendar
    description                           : Seamlessly sync your roster with your preferred calendar app, whether it's iOS, Google, or Outlook.
    fontawesome_icon_name                 : file-export

  - title                                 : Flight Lookup
    description                           : Search for any flight within your airline and see real-time crew assignments for better planning.
    fontawesome_icon_name                 : plane-departure

  - title                                 : Compare Rosters
    description                           : Look up colleagues’ rosters and compare schedules side by side.
    fontawesome_icon_name                 : users

  - title                                 : Flight Statistics & FTL Tracking
    description                           : Get an interactive map with up-to-date flight and duty limits (FTLs) to stay compliant and informed.
    fontawesome_icon_name                 : globe

  - title                                 : Pay Calculator (Limited Availability) 
    description                           : For select airlines, quickly estimate your variable pay with our built-in calculator.
    fontawesome_icon_name                 : euro-sign

